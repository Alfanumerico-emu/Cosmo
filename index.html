<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molo Magallanes | Cosmogonía</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Variables de Color y Estilos Base */
    :root {
      --card-bg: #111111; /* Fondo sólido para la tarjeta (garantiza legibilidad absoluta) */
      --primary: #FFC513;  /* Amarillo Cosmogonía */
      --text-main: #FFFFFF;
      --text-muted: #A0A0A0;
      --border-radius: 20px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      padding: 20px;
      position: relative;
    }

    /* CONTENEDOR DEL FONDO ANIMADO DE FILAS */
    .bg-animated-rows {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .row {
      height: 10vh;
      width: 100%;
      animation: fade 6s infinite ease-in-out;
      animation-direction: alternate;
    }

    /* Retrasos secuenciales para generar el efecto ola */
    .row-1  { animation-delay: 0s; }
    .row-2  { animation-delay: 0.5s; }
    .row-3  { animation-delay: 1s; }
    .row-4  { animation-delay: 1.5s; }
    .row-5  { animation-delay: 2s; }
    .row-6  { animation-delay: 2.5s; }
    .row-7  { animation-delay: 3s; }
    .row-8  { animation-delay: 3.5s; }
    .row-9  { animation-delay: 4s; }
    .row-10 { animation-delay: 4.5s; }

    /* ANIMACIÓN: De Amarillo de marca -> Escala de Grises -> Negro Profundo */
    @keyframes fade {
      0% {
        background-color: #FFC513; /* Amarillo oficial */
      }
      55% {
        background-color: #444444; /* Escala de grises (Gris medio) */
      }
      100% {
        background-color: #050505; /* Negro absoluto */
      }
    }

    /* Contenedor Principal Tarjeta NFC */
    .nfc-card {
      width: 100%;
      max-width: 420px;
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
      overflow: hidden;
      position: relative;
      padding-bottom: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Cabecera / Banner (Molo-1.jpg) */
    .card-header {
      width: 100%;
      height: 150px;
      background-color: #222;
      background-image: url('Molo-1.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(17,17,17,0) 0%, rgba(17,17,17,1) 100%);
    }

    /* Foto de Perfil (Sobre-nosotros.png) */
    .profile-pic {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--card-bg);
      margin: -65px auto 0;
      display: block;
      position: relative;
      z-index: 2;
      background-color: var(--primary);
    }

    /* Logotipo (COSMO_TRANSPARENCIA_FONDOBLANCO-1.png) */
    .brand-logo {
      width: 220px;
      display: block;
      margin: 20px auto 5px;
      filter: brightness(0) invert(1);
    }

    /* Textos */
    .name {
      text-align: center;
      font-weight: 900;
      font-size: 26px;
      margin-top: 15px;
      color: var(--text-main);
    }

    .role {
      text-align: center;
      color: var(--primary);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 30px;
      padding: 0 20px;
    }

    /* Contenedor de Botones */
    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 30px;
    }

    /* Botones de Acción Interactivos */
    .action-btn {
      display: flex;
      align-items: center;
      background-color: #1a1a1a;
      color: var(--text-main);
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      border: 1px solid #262626;
    }

    .action-btn:hover, .action-btn:active {
      background-color: var(--primary);
      color: #000;
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .action-btn:hover .icon svg {
      fill: #000;
    }

    .icon {
      width: 22px;
      height: 22px;
      margin-right: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: var(--primary);
      transition: fill 0.3s ease;
    }

    /* Redes Sociales */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
    }

    .social-btn {
      width: 45px;
      height: 45px;
      background-color: #1a1a1a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid #262626;
    }

    .social-btn:hover, .social-btn:active {
      background-color: var(--primary);
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--text-muted);
      transition: fill 0.3s ease;
    }

    .social-btn:hover svg {
      fill: #000;
    }
  </style>
</head>
